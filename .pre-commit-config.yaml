---
default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-byte-order-marker
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in sync with the `ruff` version pinned in uv.lock, so
    # pre-commit and `make lint-backend`/CI agree on lint/format results.
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [ --fix ]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    # Keep in sync with the `mypy` version pinned in uv.lock, so
    # pre-commit and `make lint-backend`/CI agree on type-check results.
    rev: v2.3.0
    hooks:
      - id: mypy
        name: mypy
        entry: mypy --config-file=mypy.ini --explicit-package-bases src
        additional_dependencies:
          - fastapi>=0.115.0
          - llm-agents-from-scratch>=0.0.19,<0.1.0
          - pydantic>=2.10.5
          - typer>=0.12.0
          - uvicorn>=0.32.0
        # https://github.com/python/mypy/issues/13916 -- duplicate module error with .pyi and .py files
        pass_filenames: false
  - repo: https://github.com/pappasam/toml-sort
    rev: v0.23.1
    hooks:
      - id: toml-sort-fix
        exclude: ".*uv.lock"
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.5.8
    hooks:
      - id: uv-lock
  - repo: local
    hooks:
      # The frontend's ESLint flat config resolves plugins through its
      # own node_modules, and Prettier needs the same install. Both
      # are run as local hooks that shell out to the npm scripts in
      # frontend/ (rather than pre-commit's node-language mirrors)
      # so they always run against the exact toolchain/config that
      # `npm run lint` / `npm run format` use in CI and locally.
      - id: eslint
        name: eslint --fix (frontend)
        entry: bash -c 'cd frontend && npm run --silent lint -- --fix'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
      - id: prettier
        name: prettier --check (frontend)
        entry: bash -c 'cd frontend && npm run --silent format:check'
        language: system
        files: ^frontend/
        exclude: ^frontend/(package-lock\.json|dist/)
        pass_filenames: false
