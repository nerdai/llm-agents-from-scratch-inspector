name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Install a specific version of uv.
          version: "0.5.21"
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up Node"
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Build package
        # The custom hatchling build hook (hatch_build.py) runs
        # `npm ci && npm run build` in frontend/ and bundles the
        # resulting assets into the wheel -- Node just needs to be on
        # PATH (set up above) for it to invoke.
        run: uv build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

  release_github:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        id: create_release
        uses: ncipollo/release-action@v1.21.0
        with:
          artifacts: "dist/*"
          generateReleaseNotes: true
