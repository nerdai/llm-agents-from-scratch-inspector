name: Packaging
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
jobs:
  build-and-verify-wheel:
    # Not gated on a tag push and doesn't touch PyPI secrets -- this runs
    # on every PR/push to main so a broken bundle (or broken post-install
    # CLI) is caught immediately, rather than only at real release time.
    # See scripts/verify_wheel_contents.sh and scripts/smoke_test_install.sh
    # for what's actually being asserted; release.yml reuses the former.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: get code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Install a specific version of uv.
          version: "0.5.21"
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Set up Node"
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Build package
        # The custom hatchling build hook (hatch_build.py) runs
        # `npm ci && npm run build` in frontend/ and bundles the
        # resulting assets into the wheel -- Node just needs to be on
        # PATH (set up above) for it to invoke.
        run: uv build

      - name: Verify wheel bundles frontend assets
        # hatch_build.py's build hook fails *open* if npm isn't found
        # on PATH (warns and returns successfully instead of failing
        # the build), so this asserts the frontend actually ended up
        # in the wheel instead of trusting the build hook silently.
        run: |
          wheel="$(bash scripts/find_one_wheel.sh)"
          bash scripts/verify_wheel_contents.sh "$wheel"

      - name: Install wheel into a clean venv and smoke-test the CLI
        # Proves the entry point actually resolves and argument
        # parsing works post-install, without needing a live LLM/
        # Ollama backend or a real agent script to point it at.
        run: |
          wheel="$(bash scripts/find_one_wheel.sh)"
          bash scripts/smoke_test_install.sh "$wheel"
